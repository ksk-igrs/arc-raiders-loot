.search { width:100%; height:40px; border:1px solid var(--line); border-radius:8px; background:var(--panel); color:var(--text); padding:0 12px; font-size:15px; }

.lookup-grid { display:grid; grid-template-columns:minmax(220px,1fr) minmax(260px,2fr); gap:12px; }
.lookup-block { background:#edf0f3; border:1px solid var(--line); border-radius:8px; padding:10px; }
.lookup-label { color:var(--muted); font-size:12px; font-weight:680; margin-bottom:8px; }
.use-list,.route-list,.favorite-list,.outputs { display:flex; flex-wrap:wrap; gap:8px; }
.use-chip,.route-chip,.favorite-chip,.output { display:inline-flex; align-items:center; gap:7px; min-height:34px; border:1px solid var(--line); background:#edf0f3; border-radius:8px; padding:4px 8px 4px 5px; font-size:13px; }
.route-chip img,.favorite-chip img,.output img { width:26px; height:26px; object-fit:contain; }
.favorite-list { min-height:34px; align-items:center; }

.favorite-button.active { color:var(--warn); border-color:var(--warn); background:#fff3d4; }
.empty,.none { color:var(--muted); font-size:13px; }
.table-wrap { border:1px solid var(--line); border-radius:8px; overflow:visible; background:var(--panel); }
table { width:100%; border-collapse:collapse; min-width:1180px; }
th,td { border-bottom:1px solid var(--line); padding:10px 12px; vertical-align:middle; }
th { position:sticky; top:var(--sticky-table-top); z-index:12; background:var(--panel-2); color:var(--muted); text-align:left; font-size:12px; font-weight:680; letter-spacing:0; }
tr:last-child td { border-bottom:0; }
.item { display:flex; align-items:center; gap:10px; min-width:230px; }
.icon { width:42px; height:42px; object-fit:contain; background:#eceff3; border:1px solid var(--line); border-radius:8px; flex:0 0 42px; }
.name { font-weight:650; }
.meta { color:var(--muted); font-size:12px; margin-top:2px; }

.qty { color:var(--accent); font-weight:760; }
footer { max-width:1280px; margin:0 auto; padding:0 20px 24px; color:var(--muted); font-size:12px; }
a { color:var(--accent); }
@media (max-width:760px) { .controls { grid-template-columns:1fr; } .filters { justify-content:flex-start; } .lookup-grid { grid-template-columns:1fr; } main,.header-inner { padding-left:12px; padding-right:12px; } }

        border: 1px solid var(--border);
        border-radius: 18px;
        background: #f6f7f9;
        box-shadow: 0 24px 80px rgba(0, 0, 0, .45);

      .item-modal-head {

        align-items: flex-start;

        gap: 18px;

        align-items: center;
        gap: 16px;
      }

      .item-modal-title img {

        height: 56px;

        border-radius: 12px;
        background: #eceff3;
      }

      .item-modal-title h2 {
        margin: 0;
        font-size: 24px;
      }

      .item-modal-title p {

        line-height: 1;

      .item-modal-body {

        let sortState = { key: "name", direction: "asc" };
        const searchInput = document.querySelector("input[placeholder*='検索']");
        const table = document.querySelector("table");
        const theadRow = document.querySelector("thead tr");
        const tbody = document.querySelector("tbody");
        const pageHeader = document.querySelector("header");
        const headerInner = document.querySelector(".header-inner");
        const statsBlock = document.querySelector(".stats");
        const lookupBlock = document.querySelector(".lookup-panel");
        const favoriteBlock = document.querySelector(".favorite-panel");
        const tableBlock = document.querySelector(".table-wrap");
        const mainBlock = document.querySelector("main");
        let activePage = location.hash === "#upgrades" ? "upgrades" : "loot";
        let activeUpgradeScope = "all";

        const esc = (value) => String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");

        const itemKey = (item) => item.name || item.nameJa;
        const iconOf = (entry) => entry?.icon || entry?.iconUrl || entry?.image || entry?.img || entry?.src || "";
        const jaNameOf = (entry) => entry?.nameJa || entry?.itemJa || entry?.ja || entry?.name || entry?.item || "不明";
        const categoryKey = (item) => item.category || item.categoryEn || item.categoryJa || "Misc";
        const speranzaCategoryKey = (item) => {
          const raw = categoryKey(item);
          if (craftingMaterialCategories.has(raw)) return "Crafting Material";
          return categoryAliases[raw] || raw || "Misc";
        };
        const rawCategoryLabel = (item) => categoryLabels[categoryKey(item)] || item.categoryJa || categoryKey(item) || "その他";
        const categoryLabel = (item) => categoryLabels[speranzaCategoryKey(item)] || rawCategoryLabel(item);
        const isFavorite = (item) => favoriteState.has(itemKey(item));

        function updateStickyTableTop() {
          const height = pageHeader ? Math.ceil(pageHeader.getBoundingClientRect().height) : 0;
          document.documentElement.style.setProperty("--sticky-table-top", `${height}px`);
        }

        updateStickyTableTop();
        window.addEventListener("resize", updateStickyTableTop);
        if (pageHeader && "ResizeObserver" in window) {
          new ResizeObserver(updateStickyTableTop).observe(pageHeader);
        }

        function saveFavorites() {
          const values = JSON.stringify([...favoriteState]);
          localStorage.setItem("arcRaidersFavoritesSperanza", values);
          localStorage.setItem("arcRaidersFavorites", values);
        }

        function acquisitionText(item) {
          const name = `${item.name || ""} ${item.nameJa || ""}`.toLowerCase();
          const category = categoryKey(item);
          const uses = Array.isArray(item.usesJa) ? item.usesJa.join(" ") : String(item.usesJa || "");

          if (category === "Key") return "対応マップの鍵箱、ロック区画周辺、高価値コンテナなどから入手します。鍵名に含まれる地名や施設名が主な探索先の目安です。";
          if (category === "Trinket") return "住宅、オフィス、店舗などの生活系ロケーションで見つかりやすい換金用戦利品です。";
          if (category === "Nature") return "自然エリア、水耕・温室系ロケーション、植物や採取ポイント周辺で入手します。";
          if (category === "Basic Material") return "上層の各種コンテナ、素材箱、低レア戦利品のリサイクルから広く入手します。";
          if (category === "Topside Material") return "工業エリア、ARC残骸、素材系コンテナ、関連戦利品のリサイクルから入手します。";
          if (category === "Refined Material" || category === "Advanced Material") return "工業・研究・医療系ロケーション、高価値コンテナ、素材やリサイクル品の分解から入手します。";
          if (category === "Recyclable") return "地上探索中のコンテナや拾得物として入手します。スペランザで分解すると下位素材にできます。";
          if (category === "Mods") return "武器ケース、セキュリティ拠点、高価値ロケーション、装備系コンテナで入手します。";
          if (category === "Augment") return "装備箱、高価値ロケーション、報酬、ショップやクラフト系導線から入手します。";
          if (category === "Shield") return "装備箱、セキュリティ拠点、報酬、ショップやクラフト系導線から入手します。";
          if (category === "Ammo") return "弾薬箱、武器ケース、セキュリティ拠点、クラフトから入手します。";
          if (category === "Quick Use" && /bandage|syringe|shot|spray|defibrillator|juice|包帯|注射|スプレー|除細動|ジュース/.test(name)) {
            return "医療エリア、薬局、病院、医療系コンテナ、クラフト導線で入手しやすいクイック使用アイテムです。";
          }
          if (category === "Quick Use" && /grenade|trap|mine|flare|グレネード|トラップ|地雷|フレア/.test(name)) {
            return "セキュリティ拠点、工業エリア、装備・弾薬系コンテナ、クラフト導線で入手しやすいクイック使用アイテムです。";
          }
          if (category === "Quick Use") return "地上探索中のコンテナ、ショップ、報酬、クラフト導線で入手します。";
          if (/Workshop|ワークショップ|設備|遠征|クエスト|Quest|Project/.test(uses)) return "地上探索の戦利品として入手し、クエスト、設備強化、遠征、プロジェクトで要求される場合があります。";
          return "地上探索中の戦利品、各種コンテナ、報酬、関連アイテムのリサイクルから入手します。";
        }

        function normalizeList(value) {
          if (!value) return [];
          if (Array.isArray(value)) return value.filter(Boolean);
          return String(value).split(/\n|;|；|、|,\s*/).map((part) => part.trim()).filter(Boolean);
        }

        function recycleEntries(item) {
          if (Array.isArray(item.outputs) && item.outputs.length) return item.outputs;
          const entries = item.recyclesToJa || item.recyclesTo || item.recycleTo || [];
          if (!Array.isArray(entries)) return [];
          return entries;
        }

        function recycleHtml(item) {
          const entries = recycleEntries(item);
          if (!entries.length) return '<span class="modal-muted">リサイクル不可</span>';
          return `<div class="modal-chip-list">${entries.map((entry) => {
            const count = entry.count || entry.qty || entry.amount || "";
            const icon = iconOf(entry);
            const iconHtml = icon ? `<img class="game-icon game-icon-sm ${esc(rarityClass(entry))}" src="${esc(icon)}" alt="${esc(jaNameOf(entry))}">` : "";
            return `<span class="modal-chip">${iconHtml}${esc(count ? `${count}個 ` : "")}${esc(jaNameOf(entry))}</span>`;
          }).join("")}</div>`;
        }

        function usesHtml(item) {
          const entries = normalizeList(item.usesJa || item.uses);
          if (!entries.length) return '<span class="modal-muted">記載なし</span>';
          return `<div class="modal-chip-list">${entries.map((entry) => `<span class="modal-chip">${esc(entry)}</span>`).join("")}</div>`;
        }

        function rarityClass(entry) {
          const match = DATA.find((item) => (
            item.name === entry?.name ||
            item.nameJa === entry?.nameJa ||
            item.nameJa === entry?.ja ||
            item.name === entry?.item ||
            item.nameJa === entry?.itemJa
          ));
          const raw = String(entry?.rarity || entry?.rarityEn || entry?.rarityJa || match?.rarity || match?.rarityJa || "Common");
          const rarityMap = {
            "コモン": "Common",
            "アンコモン": "Uncommon",
            "レア": "Rare",
            "エピック": "Epic",
            "レジェンダリー": "Legendary"
          };
          return `rarity-tile-${(rarityMap[raw] || raw).replace(/[^a-zA-Z]/g, "") || "Common"}`;
        }

        function rarityToken(item) {
          return rarityClass(item).replace("rarity-tile-", "") || "Common";
        }

        function rarityDotHtml(item) {
          const token = rarityToken(item);
          return `<span class="rarity-dot rarity-dot-${esc(token)}" title="${esc(item.rarityJa || item.rarity || "")}" aria-hidden="true"></span>`;
        }

        function imageHtml(item, sizeClass = "") {
          const src = iconOf(item);
          const classes = ["game-icon", rarityClass(item), sizeClass].filter(Boolean).join(" ");
          if (!src) return `<span class="${esc(classes)}" aria-hidden="true"></span>`;
          return `<img class="${esc(classes)}" src="${esc(src)}" alt="${esc(item.nameJa || item.name)}">`;
        }

        function buildFilters() {
          const oldLabels = new Set(["すべて", "素材", "お気に入り", "リサイクル品", "上層素材", "製作用素材", "自然素材", "不可"]);
          const oldButtons = [...document.querySelectorAll("button")].filter((button) => oldLabels.has(button.textContent.trim()));
          const firstButton = oldButtons[0];
          if (!firstButton) return null;

          const strip = document.createElement("div");
          strip.className = "speranza-filter-strip";
          firstButton.parentNode.insertBefore(strip, firstButton);
          oldButtons.forEach((button) => button.remove());

          const availableCategories = categoryOrder.filter((category) => DATA.some((item) => speranzaCategoryKey(item) === category));
          const filters = [
            { key: "all", label: "すべて" },
            { key: "favorites", label: "お気に入り" },
            { key: "highSlotValue", label: "高マス単価" },
            ...availableCategories.map((category) => ({ key: category, label: categoryLabels[category] || category }))
          ];

          const countForFilter = (key) => {
            if (key === "all") return DATA.length;
            if (key === "favorites") return DATA.filter(isFavorite).length;
            if (key === "highSlotValue") return DATA.filter(isHighSlotValue).length;
            return DATA.filter((item) => speranzaCategoryKey(item) === key).length;
          };

          strip.innerHTML = filters.map((filter) => (
            `<button type="button" class="${filter.key === activeCategory ? "active" : ""}" data-speranza-filter="${esc(filter.key)}">${esc(filter.label)}<span class="filter-count">${esc(countForFilter(filter.key))}</span></button>`
          )).join("");

          strip.addEventListener("click", (event) => {
            const button = event.target.closest("[data-speranza-filter]");
            if (!button) return;
            event.preventDefault();
            event.stopPropagation();
            activeCategory = button.dataset.speranzaFilter;
            renderSperanza();
          });
          return strip;
        }

        const filterStrip = buildFilters();

        function buildViewNav() {
          if (!headerInner) return null;
          const nav = document.createElement("div");
          nav.className = "view-nav";
          nav.innerHTML = `
            <button type="button" data-page-view="loot">戦利品一覧</button>
            <button type="button" data-page-view="upgrades">基地・スクラッピー強化</button>
          `;
          const controls = headerInner.querySelector(".controls");
          headerInner.insertBefore(nav, controls || null);
          nav.addEventListener("click", (event) => {
            const button = event.target.closest("[data-page-view]");
            if (!button) return;
            event.preventDefault();
            activePage = button.dataset.pageView;
            history.replaceState(null, "", activePage === "upgrades" ? "#upgrades" : location.pathname);
            renderPage();
          });
          return nav;
        }

        function buildUpgradeView() {
          if (!mainBlock) return null;
          const view = document.createElement("section");
          view.className = "upgrade-view";
          view.hidden = true;
          view.innerHTML = `
            <div class="upgrade-head">
              <div>
                <h2 class="upgrade-title">基地・スクラッピー強化素材</h2>
                <p class="upgrade-sub">基地設備とスクラッピーのレベルアップに必要な素材を、設備別・レベル別に確認できます。</p>
              </div>
              <div class="upgrade-scope" aria-label="強化カテゴリ">
                <button type="button" data-upgrade-scope="all">すべて</button>
                <button type="button" data-upgrade-scope="base">基地設備</button>
                <button type="button" data-upgrade-scope="scrappy">スクラッピー</button>
              </div>
            </div>
            <div class="upgrade-stats" id="upgradeStats"></div>
            <div class="upgrade-grid" id="upgradeGrid"></div>
          `;
          mainBlock.insertBefore(view, lookupBlock || tableBlock || null);
          view.addEventListener("click", (event) => {
            const button = event.target.closest("[data-upgrade-scope]");
            if (!button) return;
            event.preventDefault();
            activeUpgradeScope = button.dataset.upgradeScope;
            renderUpgrades();
          });
          return view;
        }

        const viewNav = buildViewNav();
        const upgradeView = buildUpgradeView();

        const upgradeStationAliases = {
          "Gunsmith": "ガンスミス",
          "Gear Bench": "ギアベンチ",
          "Medical Lab": "医療ラボ",
          "Explosives Station": "爆発物ステーション",
          "Utility Station": "ユーティリティステーション",
          "Refiner": "リファイナー",
          "Scrappy": "スクラッピー"
        };

        const upgradeStationOrder = [
          "ガンスミス",
          "ギアベンチ",
          "医療ラボ",
          "爆発物ステーション",
          "ユーティリティステーション",
          "リファイナー",
          "スクラッピー"
        ];

        function upgradeRequirements() {
          const requirements = [];
          const pattern = /^(ガンスミス|ギアベンチ|医療ラボ|爆発物ステーション|ユーティリティステーション|リファイナー|スクラッピー|Gunsmith|Gear Bench|Medical Lab|Explosives Station|Utility Station|Refiner|Scrappy)\s*(\d+)\s*\((\d+)\s*(?:個|×|x)?\)$/i;
          DATA.forEach((item) => {
            normalizeList(item.usesJa || item.uses).forEach((entry) => {
              const match = entry.match(pattern);
              if (!match) return;
              const station = upgradeStationAliases[match[1]] || match[1];
              requirements.push({
                area: station === "スクラッピー" ? "scrappy" : "base",
                station,
                level: Number(match[2]),
                count: Number(match[3]),
                item,
                key: `${station}-${match[2]}-${itemKey(item)}`
              });
            });
          });
          return requirements.sort((a, b) => (
            upgradeStationOrder.indexOf(a.station) - upgradeStationOrder.indexOf(b.station) ||
            a.level - b.level ||
            (a.item.nameJa || a.item.name || "").localeCompare(b.item.nameJa || b.item.name || "", "ja")
          ));
        }

        const upgradeData = upgradeRequirements();

        function requirementMatches(requirement, query) {
          if (!query) return true;
          const haystack = [
            requirement.station,
            requirement.area === "scrappy" ? "スクラッピー" : "基地 基地設備 ワークショップ",
            `Lv${requirement.level}`,
            requirement.item.nameJa,
            requirement.item.name,
            rawCategoryLabel(requirement.item),
            categoryLabel(requirement.item),
            requirement.item.usesJa,
            requirement.item.uses
          ].join(" ").toLowerCase();
          return haystack.includes(query.toLowerCase());
        }

        function groupedUpgradeData() {
          const query = searchInput ? searchInput.value.trim() : "";
          const scoped = upgradeData.filter((requirement) => (
            activeUpgradeScope === "all" || requirement.area === activeUpgradeScope
          ));
          const groups = new Map();
          scoped.forEach((requirement) => {
            const stationMatch = !query || requirement.station.toLowerCase().includes(query.toLowerCase()) ||
              (requirement.area === "base" && "基地設備 ワークショップ".includes(query)) ||
              (requirement.area === "scrappy" && "スクラッピー".includes(query));
            if (!stationMatch && !requirementMatches(requirement, query)) return;
            if (!groups.has(requirement.station)) {
              groups.set(requirement.station, {
                station: requirement.station,
                area: requirement.area,
                levels: new Map()
              });
            }
            const group = groups.get(requirement.station);
            if (!group.levels.has(requirement.level)) group.levels.set(requirement.level, []);
            group.levels.get(requirement.level).push(requirement);
          });
          return [...groups.values()].sort((a, b) => (
            upgradeStationOrder.indexOf(a.station) - upgradeStationOrder.indexOf(b.station)
          ));
        }

        function renderUpgrades() {
          if (!upgradeView) return;
          upgradeView.querySelectorAll("[data-upgrade-scope]").forEach((button) => {
            button.classList.toggle("active", button.dataset.upgradeScope === activeUpgradeScope);
          });

          const statsEl = upgradeView.querySelector("#upgradeStats");
          const gridEl = upgradeView.querySelector("#upgradeGrid");
          const baseStations = new Set(upgradeData.filter((item) => item.area === "base").map((item) => item.station)).size;
          const baseItems = new Set(upgradeData.filter((item) => item.area === "base").map((item) => itemKey(item.item))).size;
          const scrappyItems = new Set(upgradeData.filter((item) => item.area === "scrappy").map((item) => itemKey(item.item))).size;
          const visibleGroups = groupedUpgradeData();
          const visibleCount = visibleGroups.reduce((sum, group) => (
            sum + [...group.levels.values()].reduce((levelSum, level) => levelSum + level.length, 0)
          ), 0);

          if (statsEl) {
            statsEl.innerHTML = `
              <span class="stat">基地設備：${baseStations}施設</span>
              <span class="stat">基地素材：${baseItems}種類</span>
              <span class="stat">スクラッピー素材：${scrappyItems}種類</span>
              <span class="stat">表示中：${visibleCount}件</span>
            `;
          }

          if (!gridEl) return;
          if (!visibleGroups.length) {
            gridEl.innerHTML = '<div class="upgrade-empty">該当する強化素材はありません</div>';
            return;
          }

          gridEl.innerHTML = visibleGroups.map((group) => {
            const levelBlocks = [...group.levels.entries()].sort((a, b) => a[0] - b[0]).map(([level, requirements]) => `
              <div class="upgrade-level">
                <div class="upgrade-level-title">${group.area === "scrappy" ? `Lv${level}へ強化` : `Lv${level}`}</div>
                <div class="upgrade-material-list">
                  ${requirements.map((requirement) => `
                    <button type="button" class="upgrade-material" data-open-item="${esc(itemKey(requirement.item))}">
                      ${imageHtml(requirement.item, "game-icon-sm")}
                      <span class="upgrade-material-name">${esc(requirement.item.nameJa || requirement.item.name)}</span>
                      <span class="upgrade-material-count">${esc(requirement.count)}個</span>
                    </button>
                  `).join("")}
                </div>
              </div>
            `).join("");
            return `
              <section class="upgrade-card">
                <div class="upgrade-card-head">
                  <div>
                    <h3>${esc(group.station)}</h3>
                    <span>${group.area === "scrappy" ? "スクラッピー" : "基地設備"}</span>
                  </div>
                  <span>${group.levels.size}段階</span>
                </div>
                ${levelBlocks}
              </section>
            `;
          }).join("");
        }

        function renderPage() {
          const isUpgrades = activePage === "upgrades";
          if (viewNav) {
            viewNav.querySelectorAll("[data-page-view]").forEach((button) => {
              button.classList.toggle("active", button.dataset.pageView === activePage);
            });
          }
          if (filterStrip) filterStrip.hidden = isUpgrades;
          if (statsBlock) statsBlock.hidden = isUpgrades;
          if (favoriteBlock) favoriteBlock.hidden = isUpgrades;
          if (tableBlock) tableBlock.hidden = isUpgrades;
          if (lookupBlock && isUpgrades) lookupBlock.hidden = true;
          if (upgradeView) upgradeView.hidden = !isUpgrades;
          if (searchInput) {
            searchInput.placeholder = isUpgrades ? "素材名・設備名・スクラッピーで検索" : "素材名・種別・分解先で検索";
          }
          if (isUpgrades) renderUpgrades();
          else renderSperanza();
          updateStickyTableTop();
        }

        function matchesQuery(item, query) {
          if (!query) return true;
          const recycleText = recycleEntries(item).map((entry) => `${jaNameOf(entry)} ${entry.name || ""}`).join(" ");
          const haystack = [
            item.nameJa,
            item.name,
            item.rarityJa,
            item.rarity,
            categoryLabel(item),
            rawCategoryLabel(item),
            categoryKey(item),
            speranzaCategoryKey(item),
            item.sellPriceJa,
            item.stackSizeJa,
            slotValueText(item),
            isHighSlotValue(item) ? "高マス単価 マス単価 1マス" : "",
            acquisitionText(item),
            recycleText,
            item.uses,
            normalizeList(item.usesJa || item.uses).join(" ")
          ].join(" ").toLowerCase();
          return haystack.includes(query.toLowerCase());
        }

        function currentItems() {
          const query = searchInput ? searchInput.value.trim() : "";
          const rows = DATA.filter((item) => {
            if (activeCategory === "favorites" && !isFavorite(item)) return false;
            if (activeCategory === "highSlotValue" && !isHighSlotValue(item)) return false;
            if (activeCategory !== "all" && activeCategory !== "favorites" && activeCategory !== "highSlotValue" && speranzaCategoryKey(item) !== activeCategory) return false;
            return matchesQuery(item, query);
          });
          return sortRows(rows);
        }

        function numericValue(value) {
          const number = Number(String(value || "").replace(/[^\d.-]/g, ""));
          return Number.isFinite(number) ? number : -1;
        }

        function stackValue(item) {
          return numericValue(item.stackSizeJa || item.stackSize);
        }

        function sellValue(item) {
          return numericValue(item.sellPriceJa || item.sellPrice);
        }

        function slotValue(item) {
          const sell = sellValue(item);
          const stack = stackValue(item);
          return sell >= 0 && stack >= 0 ? sell * stack : -1;
        }

        function isHighSlotValue(item) {
          return slotValue(item) >= 1000 && stackValue(item) >= 2;
        }

        function slotValueText(item) {
          const value = slotValue(item);
          return value >= 0 ? `${value.toLocaleString("ja-JP")}コイン/マス` : "不明";
        }

        function slotValueFlagHtml(item) {
          return isHighSlotValue(item) ? '<span class="slot-value-flag">高マス単価</span>' : "";
        }

        function slotValueCellHtml(item) {
          return `
            <span class="slot-value-cell">
              ${slotValueFlagHtml(item)}
              <span class="${isHighSlotValue(item) ? "slot-value-amount" : "slot-value-muted"}">${esc(slotValueText(item))}</span>
            </span>
          `;
        }

        function recycleSortValue(item) {
          const entries = recycleEntries(item);
          if (!entries.length) return "リサイクル不可";
          return entries.map((entry) => `${jaNameOf(entry)} ${entry.count || entry.qty || entry.amount || ""}`).join(" ");
        }

        function sortValue(item, key) {
          const rarityRank = { "コモン": 1, "アンコモン": 2, "レア": 3, "エピック": 4, "レジェンダリー": 5 };
          if (key === "favorite") return isFavorite(item) ? 1 : 0;
          if (key === "name") return item.nameJa || item.name || "";
          if (key === "rarity") return rarityRank[item.rarityJa] || rarityRank[item.rarity] || 0;
          if (key === "category") return categoryLabel(item);
          if (key === "sell") return sellValue(item);
          if (key === "stack") return stackValue(item);
          if (key === "slotValue") return slotValue(item);
          if (key === "recycle") return recycleSortValue(item);
          return item.nameJa || item.name || "";
        }

        function sortRows(rows) {
          const { key, direction } = sortState;
          const multiplier = direction === "desc" ? -1 : 1;
          return [...rows].sort((a, b) => {
            const valueA = sortValue(a, key);
            const valueB = sortValue(b, key);
            if (typeof valueA === "number" && typeof valueB === "number") return (valueA - valueB) * multiplier;
            return String(valueA).localeCompare(String(valueB), "ja") * multiplier;
          });
        }

        function updateFavoritePanel() {
          const panel = document.querySelector(".favorite-panel");
          const countEl = document.getElementById("favoriteCount");
          const listEl = document.getElementById("favoriteList");
          const clearButton = document.getElementById("clearFavorites");
          if (!panel) return;

          const favorites = DATA.filter(isFavorite);
          if (countEl) countEl.textContent = `${favorites.length}件`;
          if (clearButton) clearButton.disabled = favorites.length === 0;
          if (listEl) {
            listEl.innerHTML = favorites.length
              ? favorites.map((item) => `
                <span class="favorite-chip" data-open-item="${esc(itemKey(item))}">
                  ${imageHtml(item)}
                  <span>${esc(item.nameJa || item.name)}</span>
                  <button class="favorite-remove" data-favorite-item="${esc(itemKey(item))}" title="${esc(item.nameJa || item.name)}を外す" aria-label="${esc(item.nameJa || item.name)}を外す">×</button>
                </span>
              `).join("")
              : '<span class="empty">まだお気に入りはありません</span>';
          }
        }

        function renderSperanza() {
          if (!tbody || !theadRow) return;
          if (filterStrip) {
            filterStrip.querySelectorAll("button").forEach((button) => {
              const key = button.dataset.speranzaFilter;
              button.classList.toggle("active", key === activeCategory);
              const countEl = button.querySelector(".filter-count");
              if (countEl) {
                const count = key === "all"
                  ? DATA.length
                  : key === "favorites"
                    ? DATA.filter(isFavorite).length
                    : key === "highSlotValue"
                      ? DATA.filter(isHighSlotValue).length
                      : DATA.filter((item) => speranzaCategoryKey(item) === key).length;
                countEl.textContent = count;
              }
            });
          }

          const sortActive = (key) => sortState.key === key ? sortState.direction : "";
          theadRow.innerHTML = `
            <th><button type="button" class="sort-button" data-sort-key="favorite" data-sort-active="${sortActive("favorite")}">お気に入り</button></th>
            <th><button type="button" class="sort-button" data-sort-key="name" data-sort-active="${sortActive("name")}">アイテム</button></th>
            <th><button type="button" class="sort-button" data-sort-key="category" data-sort-active="${sortActive("category")}">カテゴリ</button></th>
            <th><button type="button" class="sort-button" data-sort-key="sell" data-sort-active="${sortActive("sell")}">売却価格</button></th>
            <th><button type="button" class="sort-button" data-sort-key="stack" data-sort-active="${sortActive("stack")}">1スタック</button></th>
            <th><button type="button" class="sort-button" data-sort-key="slotValue" data-sort-active="${sortActive("slotValue")}">マス単価</button></th>
            <th><button type="button" class="sort-button" data-sort-key="recycle" data-sort-active="${sortActive("recycle")}">リサイクル先</button></th>
          `;

          const rows = currentItems();
          tbody.innerHTML = rows.map((item) => {
            const key = itemKey(item);
            const recycleSummary = recycleEntries(item);
            return `
              <tr data-item-name="${esc(key)}" class="${isHighSlotValue(item) ? "high-slot-row" : ""}">
                <td><button type="button" class="favorite-button" data-favorite-item="${esc(key)}" aria-label="${esc(item.nameJa || item.name)}をお気に入りにする">${isFavorite(item) ? "★" : "☆"}</button></td>
                <td>
                  <button type="button" class="item-open-button" data-open-item="${esc(key)}">
                    ${imageHtml(item)}
                    <span>
                      <span class="item-title-line">${rarityDotHtml(item)}<span class="item-name">${esc(item.nameJa || item.name)}</span>${slotValueFlagHtml(item)}</span>
                      <span class="item-sub">${esc(categoryLabel(item))}</span>
                    </span>
                  </button>
                </td>
                <td><span class="badge">${esc(categoryLabel(item))}</span></td>
                <td><span class="badge">${esc(item.sellPriceJa || "不明")}</span></td>
                <td><span class="badge">${esc(item.stackSizeJa || "不明")}</span></td>
                <td>${slotValueCellHtml(item)}</td>
                <td>${
                  recycleSummary.length
                    ? recycleSummary.map((entry) => {
                      const icon = iconOf(entry);
                      const count = entry.count || entry.qty || entry.amount || "";
                      return `<span class="recycle-chip">${icon ? `<img class="game-icon game-icon-sm ${esc(rarityClass(entry))}" src="${esc(icon)}" alt="${esc(jaNameOf(entry))}">` : ""}${esc(count ? `${count}個 ` : "")}${esc(jaNameOf(entry))}</span>`;
                    }).join("")
                    : '<span class="muted">リサイクル不可</span>'
                }</td>
              </tr>
            `;
          }).join("");

          updateFavoritePanel();
        }

        function modalRoot() {
          let root = document.getElementById("item-detail-modal");
          if (root) return root;
          root = document.createElement("div");
          root.id = "item-detail-modal";
          root.className = "modal-backdrop";
          root.innerHTML = '<div class="item-modal" role="dialog" aria-modal="true"></div>';
          document.body.appendChild(root);
          root.addEventListener("click", (event) => {
            if (event.target === root || event.target.closest("[data-close-modal]")) closeModal();
          });
          document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") closeModal();
          });
          return root;
        }

        function openModal(item) {
          const root = modalRoot();
          const modal = root.querySelector(".item-modal");
          modal.innerHTML = `
            <div class="item-modal-head">
              <div class="item-modal-title">
                ${imageHtml(item)}
                <div>
                  <div class="modal-title-line"><h2>${esc(item.nameJa || item.name)}</h2>${rarityDotHtml(item)}</div>
                  <p>${esc(categoryLabel(item))}</p>
                  <div class="modal-title-flags">${slotValueFlagHtml(item)}</div>
                </div>
              </div>
              <button type="button" class="modal-close" data-close-modal aria-label="閉じる">×</button>
            </div>
            <div class="item-modal-body">
              <div class="modal-meta-grid">
                <div class="modal-meta"><span>カテゴリ</span><strong>${esc(categoryLabel(item))}</strong></div>
                <div class="modal-meta"><span>売却価格</span><strong>${esc(item.sellPriceJa || "不明")}</strong></div>
                <div class="modal-meta"><span>1スタック</span><strong>${esc(item.stackSizeJa || "不明")}</strong></div>
                <div class="modal-meta"><span>マス単価</span><strong>${esc(slotValueText(item))}</strong></div>
              </div>
              <div class="modal-section">
                <span class="modal-section-title">入手方法</span>
                <div>${esc(acquisitionText(item))}</div>
              </div>
              <div class="modal-section">
                <span class="modal-section-title">使い道</span>
                ${usesHtml(item)}
              </div>
              <div class="modal-section">
                <span class="modal-section-title">スペランザでリサイクルした場合</span>
                ${recycleHtml(item)}
              </div>
            </div>
          `;
          root.classList.add("is-open");
        }

        function closeModal() {
          const root = document.getElementById("item-detail-modal");
          if (root) root.classList.remove("is-open");
        }

        function findItem(key) {
          return DATA.find((item) => itemKey(item) === key);
        }

        document.addEventListener("click", (event) => {
          const sortButton = event.target.closest("[data-sort-key]");
          if (sortButton) {
            event.preventDefault();
            const key = sortButton.dataset.sortKey;
            if (sortState.key === key) {
              sortState.direction = sortState.direction === "asc" ? "desc" : "asc";
            } else {
              sortState = { key, direction: "asc" };
            }
            renderSperanza();
            return;
          }

          const favButton = event.target.closest("[data-favorite-item]");
          if (favButton) {
            event.preventDefault();
            event.stopPropagation();
            const key = favButton.dataset.favoriteItem;
            if (favoriteState.has(key)) favoriteState.delete(key);
            else favoriteState.add(key);
            saveFavorites();
            renderSperanza();
            return;
          }

          const openButton = event.target.closest("[data-open-item]");
          if (openButton) {
            event.preventDefault();
            const item = findItem(openButton.dataset.openItem);
            if (item) openModal(item);
            return;
          }

          const row = event.target.closest("tr[data-item-name]");
          if (row) {
            const item = findItem(row.dataset.itemName);
            if (item) openModal(item);
          }
        });

        if (searchInput) {
          searchInput.addEventListener("input", () => {
            window.requestAnimationFrame(renderPage);
          });
        }

        window.addEventListener("hashchange", () => {
          activePage = location.hash === "#upgrades" ? "upgrades" : "loot";
          renderPage();
        });

        [...document.querySelectorAll("button")].forEach((button) => {
          if (button.textContent.trim() === "すべて解除") {
            button.addEventListener("click", () => {
              favoriteState.clear();
              saveFavorites();
              window.requestAnimationFrame(renderPage);
            });
          }
        });

        renderPage();
      })();
    </script>
  </body>
</html>
